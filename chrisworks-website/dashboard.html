<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagine It's Your Game</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0B0F1A',
                        card: '#131826',
                        cardBorder: '#1E2538',
                        accentOrange: '#F59E0B',
                        accentYellow: '#EAB308',
                        accentGreen: '#22C55E'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: transparent; color: white; margin: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; overflow: hidden; }
        
        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            border: 4px solid var(--thumb-color, #EAB308);
            transition: border-color 0.3s ease;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: transparent;
            border-radius: 4px;
        }
        
        .smooth-number {
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        .glow-yellow { text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
        .glow-green { text-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .glow-red { text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>
    <div id="root" class="w-full max-w-2xl px-4 py-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Animated Number Hook to smoothly tick values up/down
        const useAnimatedNumber = (value, duration = 400) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let startTimestamp = null;
                const startValue = displayValue;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    setDisplayValue(startValue + (value - startValue) * progress);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }, [value, duration]);
            return displayValue;
        };

        const Dashboard = () => {
            const [slider, setSlider] = useState(30);

            // Interpolation Math
            const playtimeRaw = 5 + (15 * (slider / 100)); // 5 to 20
            const retentionRaw = 20 + (30 * (slider / 100)); // 20 to 50
            const rankRaw = 30 + (67 * (slider / 100)); // 30 to 97
            const ccuRaw = 5 + (9995 * (slider / 100)); // 5 to 10k
            
            // Animated Values
            const playtime = useAnimatedNumber(playtimeRaw);
            const retention = useAnimatedNumber(retentionRaw);
            const rank = useAnimatedNumber(rankRaw);
            const ccu = useAnimatedNumber(ccuRaw);

            // Interpolate Color
            const interpolateColor = (c1, c2, factor) => {
                const hex = (c) => parseInt(c, 16);
                const r1 = hex(c1.slice(1, 3)), g1 = hex(c1.slice(3, 5)), b1 = hex(c1.slice(5, 7));
                const r2 = hex(c2.slice(1, 3)), g2 = hex(c2.slice(3, 5)), b2 = hex(c2.slice(5, 7));
                const r = Math.round(r1 + factor * (r2 - r1));
                const g = Math.round(g1 + factor * (g2 - g1));
                const b = Math.round(b1 + factor * (b2 - b1));
                const toHex = (n) => { const h = n.toString(16); return h.length === 1 ? '0' + h : h; };
                return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
            };

            let hexColor;
            if (slider <= 50) {
                hexColor = interpolateColor('#EF4444', '#FACC15', slider / 50); // Red to Yellow
            } else {
                hexColor = interpolateColor('#FACC15', '#22C55E', (slider - 50) / 50); // Yellow to Green
            }
            
            // Sync CSS variable for the input thumb border
            useEffect(() => {
                document.documentElement.style.setProperty('--thumb-color', hexColor);
            }, [hexColor]);

            // Formatter helpers
            const formatCCU = (val) => {
                if (val < 1000) return Math.round(val);
                return (val / 1000).toFixed(1) + 'K';
            };
            const formatRank = (val) => {
                const r = Math.round(val);
                if (r === 1) return '1st';
                if (r === 2) return '2nd';
                if (r === 3) return '3rd';
                return r + 'th';
            };
            
            // Performance change logic similar to screenshot
            const perfChange = (slider - 50) * 1.5; // ranges -75% to +75%
            const isNegative = perfChange < 0;
            const perfChangeStr = (isNegative ? '↓ ' : '↑ ') + Math.abs(perfChange).toFixed(1) + '%';

            return (
                <div className="w-full flex flex-col items-center gap-8">
                    {/* Title */}
                    <div className="text-center">
                        <h1 className="text-5xl md:text-7xl font-black tracking-tight mb-4 uppercase" style={{lineHeight: '1.1'}}>
                            <span style={{position: 'relative', display: 'inline-block'}}>
                                <span style={{
                                    position: 'absolute', 
                                    top: '-0.7em', 
                                    left: '50%', 
                                    transform: 'translateX(-50%) rotate(-2deg)', 
                                    fontSize: '0.6em', 
                                    color: '#FFFFFF', 
                                    fontWeight: '900', 
                                    letterSpacing: '0.2em', 
                                    whiteSpace: 'nowrap', 
                                    textTransform: 'uppercase',
                                    textShadow: '0 0 20px rgba(255,255,255,0.3)'
                                }}>IT WILL BE</span>
                                <span style={{
                                    color: 'rgba(255,255,255,0.25)', 
                                    textDecoration: 'line-through', 
                                    textDecorationColor: '#EF4444', 
                                    textDecorationThickness: '5px',
                                    textUnderlineOffset: '-0.2em',
                                    filter: 'drop-shadow(0 0 6px rgba(239,68,68,0.4))'
                                }}>IMAGINE IT'S</span>
                            </span>
                            <br/>
                            <span className="text-yellow-400" style={{textShadow: '0 0 30px rgba(250,204,21,0.3)'}}>YOUR GAME</span>
                        </h1>
                    </div>

                    {/* Main Interactive Card */}
                    <div className="w-full bg-[#111111] border border-gray-800 rounded-[20px] p-8 shadow-2xl transition-transform duration-300">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <p className="text-sm font-bold text-gray-300 font-sans tracking-tight mb-2">Average playtime</p>
                                <div className="flex items-center gap-3">
                                    <h2 className="text-[40px] font-black text-white leading-none smooth-number">{(playtime).toFixed(1)} min</h2>
                                    <div className="px-2 py-1 rounded text-sm font-bold flex items-center gap-1 border border-gray-800 smooth-number" style={{ color: hexColor, backgroundColor: `${hexColor}22` }}>
                                        {perfChangeStr}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Custom Slider Track overlapping fill */}
                        <div className="relative mt-12 mb-16 pb-[60px]">
                            {/* Floating Thumb Label */}
                            <div 
                                className="absolute top-[-30px] font-bold text-white text-[16px] transition-all duration-300 ease-in-out z-20 smooth-number"
                                style={{ left: `calc(${slider}% + ${12 - (slider * 0.24)}px)`, transform: 'translateX(-50%)' }}
                            >
                                {formatRank(rank)}
                            </div>

                            {/* Track Background */}
                            <div className="absolute top-[8px] left-0 w-full h-[8px] rounded-full bg-[#2A2A2A] pointer-events-none z-0"></div>
                            
                            {/* Track Fill */}
                            <div className="absolute top-[8px] left-0 h-[8px] rounded-full pointer-events-none z-10 transition-colors duration-100 ease-linear" 
                                style={{ width: `${slider}%`, backgroundColor: hexColor }}></div>
                            
                            <input 
                                type="range" 
                                min="0" max="100" 
                                value={slider} 
                                onChange={(e) => setSlider(Number(e.target.value))}
                                className="w-full z-30 relative cursor-pointer"
                            />

                            {/* Markers Below */}
                            <div className="absolute top-[35px] flex flex-col items-center z-10" style={{ left: `calc(50% + ${12 - (50 * 0.24)}px)`, transform: 'translateX(-50%)' }}>
                                <div className="bg-[#1A1A1A] border border-[#2A2A2A] rounded-lg px-3 py-2 text-center shadow-lg relative min-w-[60px]">
                                    <div className="absolute top-[-5px] left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[6px] border-r-[6px] border-b-[6px] border-transparent border-b-[#1A1A1A]"></div>
                                    <div className="text-gray-300 font-bold text-sm">50th</div>
                                    <div className="text-gray-400 font-medium text-xs">{(5 + (15 * 0.5)).toFixed(1)} min</div>
                                </div>
                            </div>

                            <div className="absolute top-[35px] flex flex-col items-center z-10" style={{ left: `calc(90% + ${12 - (90 * 0.24)}px)`, transform: 'translateX(-50%)' }}>
                                <div className="bg-[#1A1A1A] border border-[#2A2A2A] rounded-lg px-3 py-2 text-center shadow-lg relative min-w-[60px]">
                                    <div className="absolute top-[-5px] left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[6px] border-r-[6px] border-b-[6px] border-transparent border-b-[#1A1A1A]"></div>
                                    <div className="text-gray-300 font-bold text-sm">90th</div>
                                    <div className="text-gray-400 font-medium text-xs">{(5 + (15 * 0.9)).toFixed(1)} min</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Game Preview Card */}
                    <div className="w-full rounded-[24px] p-4 flex items-center gap-6 shadow-xl relative overflow-hidden group" style={{background: '#1A1500', border: '1px solid #3D3000'}}>
                        {/* Glow effect when > 90% */}
                        {slider > 90 && (
                            <div className="absolute inset-0 bg-[#FACC15]/10 pointer-events-none animate-pulse rounded-[24px]"></div>
                        )}
                        
                        <div className="w-32 h-20 md:w-40 md:h-24 bg-gray-800 rounded-lg flex-shrink-0 overflow-hidden border border-gray-700 relative">
                            {/* Game Thumbnail */}
                            <img src="https://tr.rbxcdn.com/180DAY-3dad5aa240a219f46588922db371b4a9/256/256/Image/Png/noFilter" alt="Roblox Game" className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        </div>
                        
                        <div className="flex-1">
                            <p className="text-xs font-bold text-yellow-400 tracking-widest uppercase mb-1">Your Game</p>
                            <h3 className="text-xl font-bold text-gray-200 mb-1">Your Game</h3>
                            <div className="flex items-center gap-1 text-sm font-semibold mb-2 text-yellow-400">
                                <span>↗</span> 93% Rating
                            </div>
                            <h2 className="text-4xl font-black smooth-number" style={{ color: hexColor, textShadow: `0 0 20px ${hexColor}66` }}>
                                {formatCCU(ccu)}
                            </h2>
                            <p className="text-xs font-bold text-gray-500 uppercase">Concurrent Users</p>
                        </div>
                    </div>

                        <p className="mt-8 text-xs text-gray-500 text-center max-w-md mx-auto">
                            Disclaimer: These figures are just estimates and may vary. Actual CCU depends heavily on other factors such as game genre, retention mechanics, and marketing efforts.
                        </p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
